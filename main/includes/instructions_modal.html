<div style="margin-bottom: 14px;">
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="openInstructionsModal()">
        Open full instructions
    </button>
</div>

<div id="instructions-modal-overlay" class="instructions-modal-overlay" style="display: none;">
    <div class="instructions-modal-card">
        <div class="instructions-modal-header">
            <strong>Instructions</strong>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="closeInstructionsModal()">Close</button>
        </div>
        <div class="instructions-modal-body">
            {{ include 'main/includes/instructions.html' }}
        </div>
    </div>
</div>

<style>
.instructions-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.45);
    z-index: 1000;
    overflow: auto;
    padding: 18px;
}
.instructions-modal-card {
    background: #fff;
    max-width: 980px;
    margin: 0 auto;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}
.instructions-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #e2e2e2;
    position: sticky;
    top: 0;
    background: #fff;
}
.instructions-modal-body {
    max-height: 78vh;
    overflow-y: auto;
    padding: 16px;
}
</style>

<script>
function openInstructionsModal() {
    document.getElementById('instructions-modal-overlay').style.display = 'block';
}

function closeInstructionsModal() {
    document.getElementById('instructions-modal-overlay').style.display = 'none';
}
</script>
